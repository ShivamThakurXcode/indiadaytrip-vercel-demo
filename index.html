<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Day Trip - Welcome change done</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #f8fafc 0%, #e0e7ff 100%);
            color: #22223b;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px 32px;
            text-align: center;
        }
        h1 {
            color: #3a5a40;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 32px;
        }
        .cta {
            display: inline-block;
            padding: 12px 32px;
            background: #3a5a40;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
        }
        .cta:hover {
            background: #588157;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to India Day Trip</h1>
        <p>Discover the best day trips and experiences across India. Plan your next adventure with us!</p>
        <a href="#" class="cta">Get Started</a>
    </div>
</body>
</html>
